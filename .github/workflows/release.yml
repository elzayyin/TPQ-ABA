name: Android Release Build & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish production release artifacts automatically?'
        required: true
        type: boolean
        default: true

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Optimize gradle.properties for CI
        run: |
          sed -i 's/kotlin.compiler.execution.strategy=.*/kotlin.compiler.execution.strategy=daemon/g' gradle.properties

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Prepare Signing Keystore
        env:
          KEY_STORE_BASE64: ${{ secrets.RELEASE_SIGNING_KEY_BASE64 }}
        run: |
          if [ -n "$KEY_STORE_BASE64" ]; then
            echo "Decoding release signing key from repository secrets..."
            echo "$KEY_STORE_BASE64" | base64 --decode > my-upload-key.jks
          else
            echo "No custom release key found. Generating temporary fallback self-signed release keystore..."
            keytool -genkey -v \
              -keystore my-upload-key.jks \
              -storepass "fallback_store_pass_123" \
              -alias "upload" \
              -keypass "fallback_key_pass_123" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=TPQ ABA Release,O=LPQ Surakarta,C=ID"
          fi

      - name: Build Release Bundle & APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEYSTORE_PATH: "../my-upload-key.jks"
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD || 'fallback_store_pass_123' }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'fallback_key_pass_123' }}
        run: |
          # Run release compilation and packaging
          ./gradlew :app:bundleRelease :app:assembleRelease \
            -PGEMINI_API_KEY="${{ env.GEMINI_API_KEY }}"

      - name: Rename Release Outputs
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk release-artifacts/tpqaba-release.apk
          cp app/build/outputs/bundle/release/app-release.aab release-artifacts/tpqaba-release.aab

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tpqaba-production-builds
          path: release-artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release-artifacts/tpqaba-release.apk
            release-artifacts/tpqaba-release.aab
          body: |
            ## 🎉 TPQ Abu Bakar Amin - New Release Outstanding Updates
            
            Alhamdulillah! We have compiled a new build for the platform automatically.
            
            ### 📦 Artifact Details
            - **Production APK**: For manual installation on Android devices.
            - **Google Play App Bundle (AAB)**: For publishing directly to Google Play.
            
            ### 🛠️ Change Log
            - Automated package compilations and unit-test assertions.
            - Full UI adjustments for Public Portal, Admin and Class Management.
            - Multi-level administrative credentials and live verification systems.
            
            *Automatically generated by GitHub Actions CI/CD Pipeline.*
          token: ${{ secrets.GITHUB_TOKEN }}

name: Android CI Build

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Optimize gradle.properties for CI
        run: |
          sed -i 's/kotlin.compiler.execution.strategy=.*/kotlin.compiler.execution.strategy=daemon/g' gradle.properties

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Create Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Setup Gradle Cache and Tooling
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Build Debug APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew assembleDebug -PGEMINI_API_KEY="${{ env.GEMINI_API_KEY }}"

      - name: Run Unit & Robolectric Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew testDebugUnitTest -PGEMINI_API_KEY="${{ env.GEMINI_API_KEY }}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tpqaba-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
